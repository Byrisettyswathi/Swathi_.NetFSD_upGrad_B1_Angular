<!DOCTYPE html>
<html>

<head>

<title>Patients</title>

<link rel="stylesheet" href="CSS/styles.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-4">

<h2 class="text-center">Patient Management</h2>
 
<!-- Form -->

<div class="form-box">

<input id="name" placeholder="Name" class="form-control mb-2">
<input id="age" placeholder="Age" class="form-control mb-2">

<select id="gender" class="form-control mb-2">
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="phone" placeholder="Phone" class="form-control mb-2">

<input id="email" placeholder="Email" class="form-control mb-2">

<button onclick="addPatient()" class="btn btn-primary">
Save
</button>

</div>


<!-- Search -->

<div class="form-box">

<input id="search" class="form-control mb-2">

<button onclick="searchPatient()" class="btn btn-success">
Search
</button>

<button onclick="displayPatients()" class="btn btn-secondary">
All
</button>

</div>


<!-- Table -->

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Phone</th>
<th>Email</th>
<th>Action</th>
</tr>

<tbody id="patientTable"></tbody>

</table>



<!-- jQuery Link-->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="JS/data.js"></script>
<script src="JS/patients.js"></script>

</body>
</html>
