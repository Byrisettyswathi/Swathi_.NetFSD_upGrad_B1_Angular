<!DOCTYPE html>
<html>

<head>

<title>Appointments</title>
<link rel="stylesheet" href="CSS/styles.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="container mt-4">
<h2 class="text-center">Appointment</h2>


<!-- Form -->

<div class="form-box">
<select id="patientSelect" class="form-control mb-2"></select>
<select id="doctorSelect" class="form-control mb-2"></select>
<input type="date" id="date" class="form-control mb-2">
<select id="time" class="form-control mb-2">

<option value="">Select Time</option>
<option>09:00 AM</option>
<option>10:00 AM</option>
<option>11:00 AM</option>
<option>12:00 PM</option>
<option>02:00 PM</option>
<option>03:00 PM</option>
<option>04:00 PM</option>
<option>05:00 PM</option>
<option>06:00 PM</option>
<option>07:00 PM</option>
<option>08:00 PM</option>
<option>09:00 PM</option>
</select>


<button onclick="addAppointment()" class="btn btn-primary"> Save </button>
</div>


<div class="row mt-4 mb-2">
<div class="col">
<input type="date" id="filterDate" class="form-control" placeholder="Filter by date">
</div>
<div class="col">

<select id="filterStatus" class="form-control">

<option value="">All Status</option>
<option>Pending</option>
<option>Completed</option>
<option>Cancelled</option>

</select>
</div>
<div class="col">
<button onclick="displayAppointments()" class="btn btn-success"> Filter </button>
</div>
</div>

<!-- Table -->

<table class="table table-bordered">
<tr>
<th>Patient</th>
<th>Doctor</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>
</tr>
<tbody id="appointmentTable"></tbody>
</table>

<!-- jQuery Link -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="JS/data.js"></script>
<script src="JS/appointments.js"></script>

</body>
</html>
