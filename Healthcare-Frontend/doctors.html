<!DOCTYPE html>
<html>

<head>

<title>Doctors</title>

<link rel="stylesheet" href="CSS/styles.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-4">

<h2 class="text-center">Doctor Management</h2>

<!-- Form -->

<div class="form-box">

<input id="doctorName" placeholder="Name" class="form-control mb-2">


<select id="specialization" class="form-control mb-2">
<option value="">Select Specialization</option>
<option>Cardiology</option>
<option>Dentist</option>
<option>Orthopedic</option>
<option>Dermatology</option>
</select>


<select id="doctorTime" class="form-control mb-2">
<option value="">Select Time Slot</option>
<option>9AM - 12:30PM</option>
<option>2PM - 5PM</option>
<option>7PM - 9PM</option>

</select>


<button onclick="addDoctor()" class="btn btn-primary">
Save
</button>

</div>



<!-- Table -->

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Name</th>
<th>Specialization</th>
<th>Time</th>
<th>Action</th>
</tr>

<tbody id="doctorTable"></tbody>

</table>



<!-- jQuery Link-->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="JS/data.js"></script>
<script src="JS/doctors.js"></script>

</body>
</html>
